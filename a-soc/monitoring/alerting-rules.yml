groups:
  - name: asoc
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 5% for 2 minutes"
          description: "HTTP 5xx rate is {{ $value | humanizePercentage }} over last 5m"

      - alert: LatencySpike
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency above 5s"
          description: "P99 latency is {{ $value }}s over last 5m"

      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state{state="open"} > 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker is open"
          description: "Circuit breaker for {{ $labels.service }} is in open state"

      - alert: RedisDown
        expr: redis_up == 0
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is unreachable"

      - alert: DatabaseDown
        expr: pg_up == 0
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Database is down"
          description: "PostgreSQL instance {{ $labels.instance }} is unreachable"
