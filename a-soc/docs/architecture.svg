<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="box-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="box-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="box-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="box-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="box-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="box-yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">A-SOC Architecture</text>

  <!-- ===== External Sources (Top) ===== -->
  <rect x="40" y="65" width="1120" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="90" fill="#94a3b8" font-size="13" font-weight="bold">EXTERNAL SOURCES</text>

  <rect x="60" y="105" width="160" height="50" rx="6" fill="url(#box-blue)" filter="url(#glow)"/>
  <text x="140" y="134" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">AWS CloudTrail</text>

  <rect x="240" y="105" width="160" height="50" rx="6" fill="url(#box-blue)" filter="url(#glow)"/>
  <text x="320" y="134" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">GCP Cloud Logging</text>

  <rect x="420" y="105" width="160" height="50" rx="6" fill="url(#box-blue)" filter="url(#glow)"/>
  <text x="500" y="134" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Azure Monitor</text>

  <rect x="600" y="105" width="140" height="50" rx="6" fill="url(#box-blue)" filter="url(#glow)"/>
  <text x="670" y="134" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">K8s Audit</text>

  <rect x="760" y="105" width="140" height="50" rx="6" fill="url(#box-blue)" filter="url(#glow)"/>
  <text x="830" y="134" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">GuardDuty</text>

  <rect x="920" y="105" width="140" height="50" rx="6" fill="url(#box-blue)" filter="url(#glow)"/>
  <text x="990" y="134" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Custom Webhook</text>

  <!-- Arrow: Sources -> Telemetry -->
  <line x1="600" y1="175" x2="600" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Agent Pipeline (Middle) ===== -->
  <rect x="40" y="210" width="1120" height="400" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="235" fill="#94a3b8" font-size="13" font-weight="bold">MULTI-AGENT PIPELINE</text>

  <!-- Agent Boxes -->
  <!-- 1 Telemetry -->
  <rect x="60" y="255" width="150" height="70" rx="8" fill="url(#box-green)" filter="url(#shadow)"/>
  <text x="135" y="283" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Telemetry</text>
  <text x="135" y="300" text-anchor="middle" fill="#dcfce7" font-size="10">Ingests logs from</text>
  <text x="135" y="314" text-anchor="middle" fill="#dcfce7" font-size="10">all cloud providers</text>

  <!-- Arrow 1->2 -->
  <line x1="210" y1="290" x2="240" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 2 Detection -->
  <rect x="250" y="255" width="150" height="70" rx="8" fill="url(#box-orange)" filter="url(#shadow)"/>
  <text x="325" y="283" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Detection</text>
  <text x="325" y="300" text-anchor="middle" fill="#ffedd5" font-size="10">LLM threat analysis</text>
  <text x="325" y="314" text-anchor="middle" fill="#ffedd5" font-size="10">Risk scoring 0-100</text>

  <!-- Arrow 2->3 -->
  <line x1="400" y1="290" x2="430" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 3 Supervisor -->
  <rect x="440" y="255" width="150" height="70" rx="8" fill="url(#box-purple)" filter="url(#shadow)"/>
  <text x="515" y="283" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Supervisor</text>
  <text x="515" y="300" text-anchor="middle" fill="#f3e8ff" font-size="10">OPA policy check</text>
  <text x="515" y="314" text-anchor="middle" fill="#f3e8ff" font-size="10">Approval gate</text>

  <!-- Arrow 3->4 -->
  <line x1="590" y1="290" x2="620" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 4 Forensics -->
  <rect x="630" y="255" width="150" height="70" rx="8" fill="url(#box-cyan)" filter="url(#shadow)"/>
  <text x="705" y="283" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Forensics</text>
  <text x="705" y="300" text-anchor="middle" fill="#cffafe" font-size="10">Blast radius</text>
  <text x="705" y="314" text-anchor="middle" fill="#cffafe" font-size="10">Attack timeline</text>

  <!-- Arrow 4->5 -->
  <line x1="780" y1="290" x2="810" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 5 Response -->
  <rect x="820" y="255" width="150" height="70" rx="8" fill="url(#box-red)" filter="url(#shadow)"/>
  <text x="895" y="283" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Response</text>
  <text x="895" y="300" text-anchor="middle" fill="#fee2e2" font-size="10">IAM revoke / Block</text>
  <text x="895" y="314" text-anchor="middle" fill="#fee2e2" font-size="10">Auto-remediate</text>

  <!-- Arrow 5->6 -->
  <line x1="970" y1="290" x2="1000" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 6 Compliance -->
  <rect x="1010" y="255" width="130" height="70" rx="8" fill="url(#box-yellow)" filter="url(#shadow)"/>
  <text x="1075" y="283" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Compliance</text>
  <text x="1075" y="300" text-anchor="middle" fill="#fef9c3" font-size="10">SOC2 / ISO 27001</text>
  <text x="1075" y="314" text-anchor="middle" fill="#fef9c3" font-size="10">Audit trail</text>

  <!-- ===== Infrastructure Layer (Bottom) ===== -->
  <rect x="40" y="350" width="1120" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="375" fill="#94a3b8" font-size="13" font-weight="bold">INFRASTRUCTURE &amp; DATA</text>

  <rect x="60" y="390" width="160" height="50" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="140" y="412" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">PostgreSQL</text>
  <text x="140" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">Events &amp; Incidents</text>

  <rect x="240" y="390" width="160" height="50" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="320" y="412" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Redis</text>
  <text x="320" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">Cache &amp; State</text>

  <rect x="420" y="390" width="160" height="50" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="500" y="412" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Open Policy Agent</text>
  <text x="500" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">Rego policies</text>

  <rect x="600" y="390" width="160" height="50" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="680" y="412" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Pinecone Vector DB</text>
  <text x="680" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">Incident similarity</text>

  <rect x="780" y="390" width="160" height="50" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="860" y="412" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">JIRA</text>
  <text x="860" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">Ticket creation</text>

  <rect x="960" y="390" width="180" height="50" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="1050" y="412" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">Slack / Teams</text>
  <text x="1050" y="428" text-anchor="middle" fill="#94a3b8" font-size="9">Notifications</text>

  <!-- === Dashboard Layer (Top) === -->
  <rect x="40" y="480" width="1120" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="505" fill="#94a3b8" font-size="13" font-weight="bold">DASHBOARD &amp; UI</text>

  <!-- Dashboard arrows from agents -->
  <line x1="135" y1="325" x2="135" y2="495" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="325" y1="325" x2="325" y2="495" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="515" y1="325" x2="515" y2="495" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="705" y1="325" x2="705" y2="495" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="895" y1="325" x2="895" y2="495" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="1075" y1="325" x2="1075" y2="495" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Dashboard boxes -->
  <rect x="60" y="515" width="320" height="50" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="538" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Next.js Dashboard (Port 3000)</text>
  <text x="220" y="554" text-anchor="middle" fill="#64748b" font-size="9">Real-time WebSocket threat feed</text>

  <rect x="400" y="515" width="320" height="50" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="560" y="538" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Blast Radius Graph</text>
  <text x="560" y="554" text-anchor="middle" fill="#64748b" font-size="9">Attack path visualization</text>

  <rect x="740" y="515" width="400" height="50" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="940" y="538" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">FastAPI Backend (Port 9002)</text>
  <text x="940" y="554" text-anchor="middle" fill="#64748b" font-size="9">LangGraph orchestration / WebSocket manager</text>

  <!-- ===== CI/CD Bottom Bar ===== -->
  <rect x="40" y="605" width="1120" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="630" fill="#94a3b8" font-size="13" font-weight="bold">CI/CD &amp; DEPLOYMENT</text>

  <rect x="60" y="620" width="200" height="25" rx="4" fill="#334155"/>
  <text x="160" y="637" text-anchor="middle" fill="#e2e8f0" font-size="10">GitHub Actions CI</text>

  <rect x="280" y="620" width="200" height="25" rx="4" fill="#334155"/>
  <text x="380" y="637" text-anchor="middle" fill="#e2e8f0" font-size="10">Docker Compose</text>

  <rect x="500" y="620" width="200" height="25" rx="4" fill="#334155"/>
  <text x="600" y="637" text-anchor="middle" fill="#e2e8f0" font-size="10">Kubernetes (EKS/GKE/AKS)</text>

  <rect x="720" y="620" width="200" height="25" rx="4" fill="#334155"/>
  <text x="820" y="637" text-anchor="middle" fill="#e2e8f0" font-size="10">AWS ECS Fargate</text>

  <rect x="940" y="620" width="200" height="25" rx="4" fill="#334155"/>
  <text x="1040" y="637" text-anchor="middle" fill="#e2e8f0" font-size="10">Vercel (Frontend)</text>

  <!-- ===== Human-in-the-Loop Badge ===== -->
  <rect x="340" y="680" width="520" height="40" rx="20" fill="#7c3aed" opacity="0.9" filter="url(#shadow)"/>
  <text x="600" y="705" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">⚡ Human-in-the-Loop Governance  •  Policy-as-Code  •  Immutable Audit Trail</text>

  <!-- ===== LLM Provider Badges ===== -->
  <rect x="100" y="740" width="200" height="30" rx="15" fill="#334155"/>
  <text x="200" y="760" text-anchor="middle" fill="#e2e8f0" font-size="11">OpenAI GPT-4</text>

  <rect x="320" y="740" width="200" height="30" rx="15" fill="#334155"/>
  <text x="420" y="760" text-anchor="middle" fill="#e2e8f0" font-size="11">Anthropic Claude</text>

  <rect x="540" y="740" width="200" height="30" rx="15" fill="#334155"/>
  <text x="640" y="760" text-anchor="middle" fill="#e2e8f0" font-size="11">DeepSeek</text>

  <rect x="760" y="740" width="200" height="30" rx="15" fill="#334155"/>
  <text x="860" y="760" text-anchor="middle" fill="#e2e8f0" font-size="11">Ollama (Local LLM)</text>

  <!-- Stats bar -->
  <rect x="100" y="790" width="1000" height="30" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="600" y="810" text-anchor="middle" fill="#22c55e" font-size="11">148 Tests  •  84% Coverage  •  0 Warnings  •  Zero-Trust Architecture</text>

  <!-- Bottom text -->
  <text x="600" y="850" text-anchor="middle" fill="#475569" font-size="10">A-SOC — Autonomous Secure AI Operations Center</text>

  <!-- Legend -->
  <circle cx="100" cy="875" r="4" fill="#22c55e"/>
  <text x="110" y="879" fill="#94a3b8" font-size="9">Agent Pipeline</text>
  <circle cx="220" cy="875" r="4" fill="#3b82f6"/>
  <text x="230" y="879" fill="#94a3b8" font-size="9">External Sources</text>
  <circle cx="360" cy="875" r="4" fill="#a855f7"/>
  <text x="370" y="879" fill="#94a3b8" font-size="9">Governance</text>
</svg>
