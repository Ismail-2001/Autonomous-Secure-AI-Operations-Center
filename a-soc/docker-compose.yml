version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: asoc-postgres
    environment:
      POSTGRES_DB: asoc_db
      POSTGRES_USER: asoc_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asoc_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asoc-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: asoc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - asoc-network

  # Ollama (Local LLM - Llama 3)
  ollama:
    image: ollama/ollama:latest
    container_name: asoc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - asoc-network
    restart: unless-stopped

  # Open Policy Agent
  opa:
    image: openpolicyagent/opa:latest
    container_name: asoc-opa
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./guardrails/policies:/policies
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - asoc-network

  # A-SOC Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asoc-backend
    environment:
      # LLM Configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://ollama:11434}
      
      # Database
      DATABASE_URL: postgresql://asoc_user:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/asoc_db
      REDIS_URL: redis://redis:6379/0
      
      # OPA
      OPA_URL: http://opa:8181
      
      # AWS (Optional - for real integrations)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      
      # GCP (Optional)
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_CREDENTIALS_PATH: ${GCP_CREDENTIALS_PATH}
      
      # Azure (Optional)
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID}
      
      # WebSocket Auth Token
      WS_API_TOKEN: ${WS_API_TOKEN:-dev-token}
      
      # Slack / Teams (Optional)
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL}
      
      # JIRA (Optional)
      JIRA_URL: ${JIRA_URL}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY}
      
    ports:
      - "9002:9002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: uvicorn api:app --host 0.0.0.0 --port 9002 --reload
    networks:
      - asoc-network
    restart: unless-stopped

  # Next.js Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: asoc-dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9002
      NEXT_PUBLIC_WS_URL: ws://localhost:9002
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - asoc-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  asoc-network:
    driver: bridge
