name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: asoc_test
          POSTGRES_USER: asoc
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        working-directory: a-soc
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting (black)
        working-directory: a-soc
        run: python -m black --check --line-length 120 .

      - name: Check imports (isort)
        working-directory: a-soc
        run: python -m isort --check-only --profile black --line-length 120 .

      - name: Run tests with coverage
        working-directory: a-soc
        env:
          DATABASE_URL: postgresql+asyncpg://asoc:testpass@localhost:5432/asoc_test
          WS_API_TOKEN: ci-test-token
        run: python -m pytest tests/ -v --cov --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: a-soc/coverage.xml
          fail_ci_if_error: false

  opa-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA tests
        working-directory: a-soc/guardrails/policies
        run: opa test . -v --coverage

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: a-soc/dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: a-soc/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
